meta:
  schema_version: 1
  ownership: auto
  locked: false
suites:
- name: javascript-vitest
  plugin: ai.gendevlabs.javascript_vitest_open
  language: javascript
  framework: vitest
  config:
    test_mode: node
    source_dirs:
    - apps/control-app/src
    - apps/public-site/src
    - packages/builder-ui/src
    - packages/framework/src
    - packages/site-schema/src
    test_dirs:
    - tests
    per_test_timeout: 30000
    lint:
      tool: eslint
    build:
      tool: tsc
    extra_args: []
