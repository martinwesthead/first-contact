chat:
  provider: claude
claude_code:
  allowed_paths: []
  sessions:
    planner:
      model: opus
    builder:
      model: opus
    assessor:
      model: opus
    editor:
      model: opus
  rate_limit:
    calls_per_hour: 9
    enabled: false
  timeout: 1800
  allow_api_key: false
  process_restart:
    initial_delay_minutes: 10
    max_attempts: 5
    token_limit_fallback_hours: 5
    token_limit_jitter_minutes: 3
  session_priming_max_attempts: 20
quality:
  min_coverage_percent: 25.0
retries:
  max: 3
resync:
  max_iterations: 10
quality_checks:
  max_retry_attempts: 5
  max_attempts_per_phase: 3
  test_batch_size: 5
  batch_iteration_buffer_percent: 50
  phase_limits:
    lint: 3
    build: 3
    tests: 10
    coverage: 10
  phase_timeouts:
    lint: 300
    build: 600
    tests: 900
    coverage: 900
resource_limits:
  enabled: true
  min_free_memory_gb: null
  max_load_average: null
  max_concurrent_simulators: 2
  max_total_retry_hours: 2.0
sprint:
  max_tasks_per_sprint: 5
  skip_validation: true
notifications:
  enabled: false
  backends:
  - ntfy
  events:
    workflow_failed: true
    choice_point: true
    workflow_success: false
  macos:
    sound: true
  ntfy:
    topic: xgd-notifications
    url: https://ntfy.sh
    tags:
    - xgd
    - workflow
required_files:
- README.md
- ARCHITECTURE.md
ticketing:
  root_dir: .xgd/tickets
  strict_mode: false
  include_archived_default: false
  lock_timeout_ms: 10000
  staging_dir: .xgd/_staging
  locks_dir: .xgd/_locks
  audit_interval_seconds: 3600
  commits:
    enabled: true
    message_template: 'xgd(ticket): {op} {type} {uid}'
workflow:
  min_free_ram_mb: 500
  memory_poll_interval_s: 30
dispatcher:
  poll_interval_seconds: 30
  bundle_untangle_gap_commits: 50
  max_unmerged_feature_branches: 8
  max_concurrent_capacity: 4
  costs:
    develop: 1.0
    reconcile: 0.5
    auto_merge_back: 0.6
    regression: 1.0
  regression:
    auto_start: false
    scheduled_time: '23:00'
watchdog:
  max_fix_cycles: 20
merge_back:
  max_iterations: 5
  regression:
    auto_merge_back: true
  reconciliation:
    auto_merge_back: true
structural_validation:
  min_uats_per_capability: 20
  max_uats_per_capability: 200
dashboard:
  idle_timeout: NEVER
  default_port: 8888
  bind_address: 127.0.0.1
project:
  prd: null
  brd: null
  architecture: null
  checklist: null
  dev_model: null
