<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>1st Contact</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      #fc-app-root {
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      /* REQ-17: app shell — top bar + tab bar + avatar + content + chat. */
      .fc-app {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        height: 100%;
        min-width: 0;
      }
      .fc-app__topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        height: 48px;
        flex: 0 0 48px;
        padding: 0 12px;
        background: #1e293b;
        border-bottom: 1px solid #334155;
      }
      .fc-app__site {
        font-weight: 600;
        font-size: 14px;
        color: #f8fafc;
        white-space: nowrap;
      }
      .fc-app__tabs {
        display: flex;
        gap: 4px;
        margin: 0 auto;
      }
      .fc-app__tab {
        background: transparent;
        color: #cbd5e1;
        border: 0;
        border-bottom: 2px solid transparent;
        padding: 6px 14px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        border-radius: 6px 6px 0 0;
      }
      .fc-app__tab:hover:not(:disabled) {
        background: #0b1220;
        color: #f8fafc;
      }
      .fc-app__tab.is-active {
        color: #f8fafc;
        border-bottom-color: #2563eb;
      }
      .fc-app__tab:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .fc-app__avatar-wrap {
        position: relative;
        margin-left: auto;
      }
      .fc-app__avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 0;
        background: #2563eb;
        color: #f8fafc;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .fc-app__avatar-menu {
        position: absolute;
        top: 40px;
        right: 0;
        min-width: 160px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 4px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        z-index: 20;
      }
      .fc-app__avatar-menu[hidden] {
        display: none;
      }
      .fc-app__avatar-item {
        background: transparent;
        color: #e2e8f0;
        border: 0;
        text-align: left;
        padding: 8px 10px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        border-radius: 6px;
      }
      .fc-app__avatar-item:hover {
        background: #0b1220;
        color: #f8fafc;
      }
      .fc-app__body {
        display: flex;
        flex: 1 1 auto;
        min-height: 0;
      }
      .fc-app__content {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        position: relative;
        background: #fff;
      }
      .fc-app__tab-content {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .fc-app__tab-content[hidden] {
        display: none;
      }
      .fc-app__chat {
        flex: 0 0 360px;
        width: 360px;
        display: flex;
        flex-direction: column;
        background: #1e293b;
        color: #f8fafc;
        border-left: 1px solid #334155;
        overflow: hidden;
      }
      .fc-app__chat[hidden] {
        display: none;
      }
      .fc-app__chat-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        border-bottom: 1px solid #334155;
        flex: 0 0 auto;
      }
      .fc-app__chat-title {
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .fc-app__chat-collapse {
        margin-left: auto;
        background: transparent;
        color: #f8fafc;
        border: 0;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }
      .fc-app__chat-body {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .fc-app__chat-slot {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .fc-app__chat-slot[hidden] {
        display: none;
      }
      .fc-app__chat-restore {
        flex: 0 0 32px;
        width: 32px;
        background: #1e293b;
        color: #f8fafc;
        border: 0;
        border-left: 1px solid #334155;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }
      .fc-app__chat-restore[hidden] {
        display: none;
      }
      .fc-app__chat-restore:hover {
        background: #334155;
      }
      .fc-app__placeholder {
        padding: 24px;
        color: #64748b;
        font-size: 14px;
      }
      .fc-app__chat-slot .fc-app__placeholder {
        color: #94a3b8;
      }

      /* Builder chat + preview styles — the Builder tab mounts the existing
         chat/preview components inside the shell, so it needs the same rules
         the standalone /builder page uses. Ported from builder.html (REQ-36). */
      .fc-chat {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 8px 8px 12px;
        box-sizing: border-box;
        font-size: 13px;
        line-height: 1.6;
      }
      .fc-chat__header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 8px 8px;
        flex-shrink: 0;
      }
      .fc-chat__header-title {
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .fc-chat__new-session {
        margin-left: auto;
        font: inherit;
        font-size: 12px;
        color: #cbd5e1;
        background: #0b1220;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 4px 10px;
        cursor: pointer;
      }
      .fc-chat__new-session:hover {
        background: #111a2e;
        color: #f8fafc;
        border-color: #475569;
      }
      .fc-chat__messages {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 0 8px 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .fc-chat__message {
        font-size: 13px;
        line-height: 1.6;
      }
      .fc-chat__message--user .fc-chat__message-text {
        max-width: 80%;
        align-self: flex-end;
        margin-left: auto;
        padding: 10px 14px;
        border-radius: 8px;
        background: #2563eb;
        color: #f8fafc;
      }
      .fc-chat__message--assistant .fc-chat__message-text,
      .fc-chat__message--system .fc-chat__message-text {
        width: 100%;
        padding: 10px 0;
        color: #e2e8f0;
      }
      .fc-chat__message-text h1,
      .fc-chat__message-text h2,
      .fc-chat__message-text h3 {
        margin: 0.5em 0 0.25em;
        line-height: 1.3;
      }
      .fc-chat__message--assistant .fc-chat__message-text h1,
      .fc-chat__message--assistant .fc-chat__message-text h2,
      .fc-chat__message--assistant .fc-chat__message-text h3 {
        color: #60a5fa;
      }
      .fc-chat__message-text p {
        margin: 0 0 0.5em;
      }
      .fc-chat__message-text p:last-child {
        margin-bottom: 0;
      }
      .fc-chat__message-text ul,
      .fc-chat__message-text ol {
        padding-left: 1.5em;
        margin: 0 0 0.5em;
      }
      .fc-chat__message--assistant .fc-chat__message-text blockquote {
        border-left: 3px solid #475569;
        padding-left: 0.75em;
        color: #94a3b8;
        margin: 0.5em 0;
      }
      .fc-chat__message--user .fc-chat__message-text blockquote {
        border-left: 3px solid rgba(255, 255, 255, 0.5);
        padding-left: 0.75em;
        color: rgba(255, 255, 255, 0.85);
        margin: 0.5em 0;
      }
      .fc-chat__message--assistant .fc-chat__message-text pre {
        background: #0b1220;
        color: #e2e8f0;
        padding: 12px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
        margin: 0.5em 0;
      }
      .fc-chat__message--user .fc-chat__message-text pre {
        background: rgba(0, 0, 0, 0.25);
        color: #e2e8f0;
        padding: 12px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
        margin: 0.5em 0;
      }
      .fc-chat__message--assistant .fc-chat__message-text code {
        background: rgba(148, 163, 184, 0.18);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 12px;
        color: #fda4af;
      }
      .fc-chat__message--user .fc-chat__message-text code {
        background: rgba(0, 0, 0, 0.25);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 12px;
        color: inherit;
      }
      .fc-chat__message-text pre code {
        background: transparent;
        padding: 0;
        color: inherit;
      }
      .fc-chat__tool-call {
        margin-top: 6px;
        padding: 4px 6px;
        font-size: 12px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
      }
      .fc-chat__tool-call.is-rejected {
        background: rgba(239, 68, 68, 0.2);
      }
      .fc-chat__tool-header {
        display: flex;
        align-items: center;
        padding: 5px 12px;
        gap: 6px;
        background: #0b1220;
        border-top: 1px solid #334155;
        border-bottom: 1px solid #334155;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }
      .fc-chat__tool-header:hover {
        background: #111a2e;
      }
      .fc-chat__tool-chevron {
        font-size: 9px;
        color: #94a3b8;
        width: 10px;
        display: inline-block;
      }
      .fc-chat__tool-header-label {
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .fc-chat__tool-pane {
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
        border-bottom: 1px solid #334155;
        background: #0b1220;
        max-height: 35%;
      }
      .fc-chat__tool-pane[hidden] {
        display: none;
      }
      .fc-chat__tool-pane-body {
        flex: 1;
        overflow-y: auto;
        overflow-x: auto;
        padding: 6px 0;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        font-size: 12px;
      }
      .fc-chat__tool-event {
        padding: 4px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .fc-chat__tool-event:last-child {
        border-bottom: none;
      }
      .fc-chat__tool-event-header {
        color: #e2e8f0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.6;
      }
      .fc-chat__tool-event-name {
        color: #2dd4bf;
      }
      .fc-chat__tool-event[data-status="rejected"] .fc-chat__tool-event-name {
        color: #f87171;
      }
      .fc-chat__input {
        position: relative;
        display: flex;
        padding: 12px 4px 4px;
        flex-shrink: 0;
      }
      .fc-chat__editor {
        flex: 1 1 auto;
        position: relative;
        min-width: 0;
        background: #0b1220;
        border: 1px solid #334155;
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .fc-chat__editor:focus-within {
        border-color: #2563eb;
      }
      .fc-chat__editor-content {
        flex: 1 1 auto;
        box-sizing: border-box;
        padding: 10px 62px 10px 14px;
        min-height: 44px;
        max-height: 232px;
        overflow-y: auto;
        color: #f8fafc;
        font-size: 13px;
        line-height: 1.6;
        outline: none;
      }
      .fc-chat__editor-content p {
        margin: 0 0 0.4em;
      }
      .fc-chat__editor-content p:last-child {
        margin-bottom: 0;
      }
      .fc-chat__editor-content h1,
      .fc-chat__editor-content h2,
      .fc-chat__editor-content h3 {
        margin: 0.3em 0 0.2em;
        line-height: 1.3;
      }
      .fc-chat__editor-content ul,
      .fc-chat__editor-content ol {
        padding-left: 1.4em;
        margin: 0.3em 0;
      }
      .fc-chat__editor-content blockquote {
        border-left: 3px solid #475569;
        background: rgba(148, 163, 184, 0.08);
        padding: 4px 10px;
        border-radius: 4px;
        margin: 4px 0;
        color: #cbd5e1;
      }
      .fc-chat__editor-content pre {
        background: #020617;
        color: #e2e8f0;
        padding: 8px 10px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
        margin: 0.3em 0;
      }
      .fc-chat__editor-content code {
        background: rgba(148, 163, 184, 0.18);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 12px;
      }
      .fc-chat__editor-content pre code {
        background: transparent;
        padding: 0;
      }
      .fc-chat__editor-content table {
        border-collapse: collapse;
        margin: 0.3em 0;
        width: 100%;
        table-layout: fixed;
      }
      .fc-chat__editor-content th,
      .fc-chat__editor-content td {
        border: 1px solid #334155;
        padding: 4px 8px;
        vertical-align: top;
        text-align: left;
        word-break: break-word;
      }
      .fc-chat__editor-content th {
        background: rgba(148, 163, 184, 0.08);
        font-weight: 600;
      }
      .fc-chat__editor-content p.is-editor-empty:first-child::before {
        content: attr(data-placeholder);
        color: #94a3b8;
        pointer-events: none;
        float: left;
        height: 0;
      }
      .fc-chat__send,
      .fc-chat__stop {
        position: absolute;
        right: 8px;
        bottom: 8px;
        width: 36px;
        height: 36px;
        border: 0;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        color: #f8fafc;
      }
      .fc-chat__send {
        background: #2563eb;
      }
      .fc-chat__send:hover {
        background: #1d4ed8;
      }
      .fc-chat__send:disabled {
        background: #475569;
        cursor: not-allowed;
      }
      .fc-chat__stop {
        background: #dc2626;
        display: none;
      }
      .fc-chat__stop:hover {
        background: #b91c1c;
      }
      .fc-chat__send[data-fc-chat-send-busy] {
        display: none;
      }
      .fc-chat__stop[data-fc-chat-stop-visible] {
        display: flex;
      }
      .fc-preview {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
      }
      .fc-preview__toolbar {
        background: #f1f5f9;
        color: #0f172a;
        padding: 6px 8px;
        display: flex;
        gap: 6px;
        border-bottom: 1px solid #cbd5e1;
        flex: 0 0 auto;
      }
      .fc-preview__viewport {
        background: transparent;
        border: 1px solid #94a3b8;
        border-radius: 4px;
        padding: 4px 8px;
        cursor: pointer;
        font: inherit;
      }
      .fc-preview__viewport.is-active {
        background: #0f172a;
        color: #f8fafc;
        border-color: #0f172a;
      }
      .fc-preview__iframe {
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="fc-app-root" data-site="1stcontact" data-tab="builder"></div>
    <script type="module" src="/_assets/app.js"></script>
  </body>
</html>
