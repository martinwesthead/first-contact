<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>1st Contact Builder</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      #fc-builder-root {
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      .fc-builder {
        display: flex;
        flex: 1 1 auto;
        height: 100%;
      }
      .fc-builder__chat {
        display: flex;
        flex-direction: column;
        background: #1e293b;
        color: #f8fafc;
        border-right: 1px solid #334155;
        position: relative;
        overflow: hidden;
      }
      .fc-builder__collapse {
        position: absolute;
        top: 8px;
        right: 8px;
        background: transparent;
        color: #f8fafc;
        border: 0;
        cursor: pointer;
        font-size: 18px;
      }
      .fc-builder__splitter {
        width: 6px;
        cursor: col-resize;
        background: #334155;
      }
      .fc-builder__preview {
        flex: 1 1 auto;
        background: #fff;
        display: flex;
        flex-direction: column;
      }
      .fc-builder__restore {
        background: #1e293b;
        color: #f8fafc;
        border: 0;
        border-right: 1px solid #334155;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        flex-shrink: 0;
        font-size: 18px;
        line-height: 1;
      }
      .fc-builder__restore:hover {
        background: #334155;
      }
      .fc-chat {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 32px 12px 12px;
        box-sizing: border-box;
      }
      .fc-chat__messages {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 0 0 8px;
      }
      .fc-chat__message {
        padding: 6px 8px;
        margin-bottom: 6px;
        border-radius: 6px;
        background: #0f172a;
        white-space: pre-wrap;
      }
      .fc-chat__message--user {
        background: #2563eb;
      }
      .fc-chat__tool-call {
        margin-top: 6px;
        padding: 4px 6px;
        font-size: 12px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
      }
      .fc-chat__tool-call.is-rejected {
        background: rgba(239, 68, 68, 0.2);
      }
      .fc-chat__input {
        display: flex;
        gap: 6px;
        align-items: stretch;
      }
      .fc-chat__editor {
        flex: 1 1 auto;
        min-width: 0;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .fc-chat__editor:focus-within {
        border-color: #2563eb;
      }
      .fc-chat__editor-content {
        flex: 1 1 auto;
        min-height: 60px;
        max-height: 200px;
        overflow-y: auto;
        color: #f8fafc;
        padding: 6px 8px;
        font: inherit;
        outline: none;
      }
      .fc-chat__editor-content p {
        margin: 0 0 4px;
      }
      .fc-chat__editor-content p:last-child {
        margin-bottom: 0;
      }
      .fc-chat__send {
        background: #2563eb;
        color: #fff;
        border: 0;
        border-radius: 4px;
        padding: 6px 12px;
        cursor: pointer;
        flex: 0 0 auto;
        align-self: flex-end;
        min-width: 64px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .fc-chat__send:hover {
        background: #1d4ed8;
      }
      .fc-chat__send:disabled {
        cursor: not-allowed;
        background: #1d4ed8;
        opacity: 0.85;
      }
      .fc-chat__send-spinner {
        display: none;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: fc-chat-spin 0.8s linear infinite;
      }
      .fc-chat__send[aria-busy="true"] .fc-chat__send-label {
        display: none;
      }
      .fc-chat__send[aria-busy="true"] .fc-chat__send-spinner {
        display: inline-block;
      }
      @keyframes fc-chat-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .fc-preview {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
      }
      .fc-preview__toolbar {
        background: #f1f5f9;
        color: #0f172a;
        padding: 6px 8px;
        display: flex;
        gap: 6px;
        border-bottom: 1px solid #cbd5e1;
        flex: 0 0 auto;
      }
      .fc-preview__viewport {
        background: transparent;
        border: 1px solid #94a3b8;
        border-radius: 4px;
        padding: 4px 8px;
        cursor: pointer;
        font: inherit;
      }
      .fc-preview__viewport.is-active {
        background: #0f172a;
        color: #f8fafc;
        border-color: #0f172a;
      }
      .fc-preview__iframe {
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="fc-builder-root"></div>
    <script type="module" src="/_assets/builder.js"></script>
  </body>
</html>
