<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>1st Contact Builder</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      #fc-builder-root {
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      .fc-builder {
        display: flex;
        flex: 1 1 auto;
        height: 100%;
      }
      .fc-builder__chat {
        display: flex;
        flex-direction: column;
        background: #1e293b;
        color: #f8fafc;
        border-right: 1px solid #334155;
        position: relative;
        overflow: hidden;
      }
      .fc-builder__collapse {
        position: absolute;
        top: 8px;
        right: 8px;
        background: transparent;
        color: #f8fafc;
        border: 0;
        cursor: pointer;
        font-size: 18px;
      }
      .fc-builder__splitter {
        width: 6px;
        cursor: col-resize;
        background: #334155;
      }
      .fc-builder__preview {
        flex: 1 1 auto;
        background: #fff;
        display: flex;
        flex-direction: column;
      }
      .fc-builder__restore {
        background: #1e293b;
        color: #f8fafc;
        border: 0;
        border-right: 1px solid #334155;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        flex-shrink: 0;
        font-size: 18px;
        line-height: 1;
      }
      .fc-builder__restore:hover {
        background: #334155;
      }
      /* REQ-36: chat panel restyle — ported from XGD's chat widget
         (xgendev-main/xgd_source/dashboard/static/index.html ~L3902-4500).
         Tokens / structure / button shape mirror the XGD reference so the
         two products feel like the same family. */
      .fc-chat {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 32px 8px 12px;
        box-sizing: border-box;
        font-size: 13px;
        line-height: 1.6;
      }
      .fc-chat__messages {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 0 8px 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .fc-chat__message {
        font-size: 13px;
        line-height: 1.6;
      }
      .fc-chat__message--user .fc-chat__message-text {
        max-width: 80%;
        align-self: flex-end;
        margin-left: auto;
        padding: 10px 14px;
        border-radius: 8px;
        background: #2563eb;
        color: #f8fafc;
      }
      .fc-chat__message--assistant .fc-chat__message-text,
      .fc-chat__message--system .fc-chat__message-text {
        width: 100%;
        padding: 10px 0;
        color: #e2e8f0;
      }
      /* Markdown typography inside the message bubbles. Ported from XGD's
         .chat-message.user / .chat-message.assistant rules. */
      .fc-chat__message-text h1,
      .fc-chat__message-text h2,
      .fc-chat__message-text h3 {
        margin: 0.5em 0 0.25em;
        line-height: 1.3;
      }
      .fc-chat__message--assistant .fc-chat__message-text h1,
      .fc-chat__message--assistant .fc-chat__message-text h2,
      .fc-chat__message--assistant .fc-chat__message-text h3 {
        color: #60a5fa;
      }
      .fc-chat__message-text p {
        margin: 0 0 0.5em;
      }
      .fc-chat__message-text p:last-child {
        margin-bottom: 0;
      }
      .fc-chat__message-text ul,
      .fc-chat__message-text ol {
        padding-left: 1.5em;
        margin: 0 0 0.5em;
      }
      .fc-chat__message--assistant .fc-chat__message-text blockquote {
        border-left: 3px solid #475569;
        padding-left: 0.75em;
        color: #94a3b8;
        margin: 0.5em 0;
      }
      .fc-chat__message--user .fc-chat__message-text blockquote {
        border-left: 3px solid rgba(255, 255, 255, 0.5);
        padding-left: 0.75em;
        color: rgba(255, 255, 255, 0.85);
        margin: 0.5em 0;
      }
      .fc-chat__message--assistant .fc-chat__message-text pre {
        background: #0b1220;
        color: #e2e8f0;
        padding: 12px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
        margin: 0.5em 0;
      }
      .fc-chat__message--user .fc-chat__message-text pre {
        background: rgba(0, 0, 0, 0.25);
        color: #e2e8f0;
        padding: 12px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
        margin: 0.5em 0;
      }
      .fc-chat__message--assistant .fc-chat__message-text code {
        background: rgba(148, 163, 184, 0.18);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 12px;
        color: #fda4af;
      }
      .fc-chat__message--user .fc-chat__message-text code {
        background: rgba(0, 0, 0, 0.25);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 12px;
        color: inherit;
      }
      .fc-chat__message-text pre code {
        background: transparent;
        padding: 0;
        color: inherit;
      }
      .fc-chat__tool-call {
        margin-top: 6px;
        padding: 4px 6px;
        font-size: 12px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
      }
      .fc-chat__tool-call.is-rejected {
        background: rgba(239, 68, 68, 0.2);
      }
      /* Tool-use pane — collapsible chevron-headed pane at the top of the
         chat that streams live tool-call activity. Separate from the inline
         tool-result cards in the message list (operator: keep both, they're
         not alternatives). */
      .fc-chat__tool-header {
        display: flex;
        align-items: center;
        padding: 5px 12px;
        gap: 6px;
        background: #0b1220;
        border-top: 1px solid #334155;
        border-bottom: 1px solid #334155;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }
      .fc-chat__tool-header:hover {
        background: #111a2e;
      }
      .fc-chat__tool-chevron {
        font-size: 9px;
        color: #94a3b8;
        width: 10px;
        display: inline-block;
      }
      .fc-chat__tool-header-label {
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .fc-chat__tool-pane {
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
        border-bottom: 1px solid #334155;
        background: #0b1220;
        max-height: 35%;
      }
      .fc-chat__tool-pane[hidden] {
        display: none;
      }
      .fc-chat__tool-pane-body {
        flex: 1;
        overflow-y: auto;
        overflow-x: auto;
        padding: 6px 0;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        font-size: 12px;
      }
      .fc-chat__tool-event {
        padding: 4px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .fc-chat__tool-event:last-child {
        border-bottom: none;
      }
      .fc-chat__tool-event-header {
        color: #e2e8f0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.6;
      }
      .fc-chat__tool-event-name {
        color: #2dd4bf;
      }
      .fc-chat__tool-event[data-status="rejected"] .fc-chat__tool-event-name {
        color: #f87171;
      }
      /* Input row: pill-shaped contenteditable with the Send/Stop button
         absolute-positioned inside, mirroring XGD's chat-input-wrapper. */
      .fc-chat__input {
        position: relative;
        display: flex;
        padding: 12px 4px 4px;
        flex-shrink: 0;
      }
      .fc-chat__editor {
        flex: 1 1 auto;
        position: relative;
        min-width: 0;
        background: #0b1220;
        border: 1px solid #334155;
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .fc-chat__editor:focus-within {
        border-color: #2563eb;
      }
      .fc-chat__editor-content {
        flex: 1 1 auto;
        box-sizing: border-box;
        /* right padding clears the inline Send/Stop button with breathing room */
        padding: 10px 62px 10px 14px;
        min-height: 44px;
        max-height: 232px;
        overflow-y: auto;
        color: #f8fafc;
        font-size: 13px;
        line-height: 1.6;
        outline: none;
      }
      .fc-chat__editor-content p {
        margin: 0 0 0.4em;
      }
      .fc-chat__editor-content p:last-child {
        margin-bottom: 0;
      }
      .fc-chat__editor-content h1,
      .fc-chat__editor-content h2,
      .fc-chat__editor-content h3 {
        margin: 0.3em 0 0.2em;
        line-height: 1.3;
      }
      .fc-chat__editor-content ul,
      .fc-chat__editor-content ol {
        padding-left: 1.4em;
        margin: 0.3em 0;
      }
      .fc-chat__editor-content blockquote {
        border-left: 3px solid #475569;
        background: rgba(148, 163, 184, 0.08);
        padding: 4px 10px;
        border-radius: 4px;
        margin: 4px 0;
        color: #cbd5e1;
      }
      .fc-chat__editor-content pre {
        background: #020617;
        color: #e2e8f0;
        padding: 8px 10px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
        margin: 0.3em 0;
      }
      .fc-chat__editor-content code {
        background: rgba(148, 163, 184, 0.18);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 12px;
      }
      .fc-chat__editor-content pre code {
        background: transparent;
        padding: 0;
      }
      .fc-chat__editor-content table {
        border-collapse: collapse;
        margin: 0.3em 0;
        width: 100%;
        table-layout: fixed;
      }
      .fc-chat__editor-content th,
      .fc-chat__editor-content td {
        border: 1px solid #334155;
        padding: 4px 8px;
        vertical-align: top;
        text-align: left;
        word-break: break-word;
      }
      .fc-chat__editor-content th {
        background: rgba(148, 163, 184, 0.08);
        font-weight: 600;
      }
      /* Placeholder: TipTap's StarterKit injects the data-placeholder
         attribute on the empty first paragraph. */
      .fc-chat__editor-content p.is-editor-empty:first-child::before {
        content: attr(data-placeholder);
        color: #94a3b8;
        pointer-events: none;
        float: left;
        height: 0;
      }
      .fc-chat__send,
      .fc-chat__stop {
        position: absolute;
        right: 8px;
        bottom: 8px;
        width: 36px;
        height: 36px;
        border: 0;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        color: #f8fafc;
      }
      .fc-chat__send {
        background: #2563eb;
      }
      .fc-chat__send:hover {
        background: #1d4ed8;
      }
      .fc-chat__send:disabled {
        background: #475569;
        cursor: not-allowed;
      }
      .fc-chat__stop {
        background: #dc2626;
        display: none;
      }
      .fc-chat__stop:hover {
        background: #b91c1c;
      }
      /* While a turn is in flight, swap Send for Stop. */
      .fc-chat__send[data-fc-chat-send-busy] {
        display: none;
      }
      .fc-chat__stop[data-fc-chat-stop-visible] {
        display: flex;
      }
      .fc-preview {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
      }
      .fc-preview__toolbar {
        background: #f1f5f9;
        color: #0f172a;
        padding: 6px 8px;
        display: flex;
        gap: 6px;
        border-bottom: 1px solid #cbd5e1;
        flex: 0 0 auto;
      }
      .fc-preview__viewport {
        background: transparent;
        border: 1px solid #94a3b8;
        border-radius: 4px;
        padding: 4px 8px;
        cursor: pointer;
        font: inherit;
      }
      .fc-preview__viewport.is-active {
        background: #0f172a;
        color: #f8fafc;
        border-color: #0f172a;
      }
      .fc-preview__iframe {
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="fc-builder-root"></div>
    <script type="module" src="/_assets/builder.js"></script>
  </body>
</html>
