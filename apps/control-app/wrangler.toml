name = "1stcontact-control-app"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

[assets]
directory = "public"
binding = "ASSETS"

[env.production]
routes = [
  { pattern = "app.1stcontact.io/*", zone_name = "1stcontact.io" }
]

[env.production.assets]
directory = "public"
binding = "ASSETS"
