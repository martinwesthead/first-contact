name = "1stcontact-control-app"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

[assets]
directory = "public"
binding = "ASSETS"

# Web-fetch safety layer: rate-limit, response, robots, and browser-rendering
# budget counters (REQ-20). Real namespace IDs filled in at deploy time; in
# `wrangler dev` Miniflare emulates KV locally so the placeholder is fine.
[[kv_namespaces]]
binding = "FETCH_RATE_KV"
id = "placeholder_fetch_rate_kv"

[[kv_namespaces]]
binding = "FETCH_CACHE_KV"
id = "placeholder_fetch_cache_kv"

[[kv_namespaces]]
binding = "FETCH_ROBOTS_KV"
id = "placeholder_fetch_robots_kv"

[[kv_namespaces]]
binding = "BROWSER_BUDGET_KV"
id = "placeholder_browser_budget_kv"

# R2 assets bucket (REQ-20). Backs the /api/assets/* + /assets/<key> routes
# and is the target for downstream screenshot/asset persistence (REQ-21/22)
# and the assets-tab editor (REQ-16).
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "1stcontact-assets"

# D1 database (REQ-10 schema, REQ-23 chat schema). Local Miniflare emulates
# D1 in `wrangler dev`; production binding fills in `database_id` at deploy.
[[d1_databases]]
binding = "SITES_DB"
database_name = "1stcontact-sites"
database_id = "placeholder_sites_db"
migrations_dir = "../../db/migrations"

# Browser Rendering binding (REQ-22 / REQ-51). Drives @cloudflare/puppeteer
# from the analyze_page and preview_generated_page rendered-fetch paths.
#
# Wrangler dev cannot emulate Browser Rendering locally — it's a real
# Cloudflare-hosted service that spins up Chromium on CF infra. The
# `remote = true` flag (per Wrangler's "remote bindings" feature) tells the
# local dev server to proxy ONLY this binding to real Cloudflare while KV /
# R2 / D1 stay in Miniflare. Without it, plain `pnpm dev` leaves env.BROWSER
# undefined and both rendered-fetch handlers degrade to a no-screenshot path.
#
# Charges against your CF account: each browser-second is billed. The REQ-20
# per-session budget (default 50s) still applies.
[browser]
binding = "BROWSER"
remote = true

[env.production]
routes = [
  { pattern = "app.1stcontact.io/*", zone_name = "1stcontact.io" }
]

[env.production.assets]
directory = "public"
binding = "ASSETS"

[[env.production.kv_namespaces]]
binding = "FETCH_RATE_KV"
id = "placeholder_fetch_rate_kv"

[[env.production.kv_namespaces]]
binding = "FETCH_CACHE_KV"
id = "placeholder_fetch_cache_kv"

[[env.production.kv_namespaces]]
binding = "FETCH_ROBOTS_KV"
id = "placeholder_fetch_robots_kv"

[[env.production.kv_namespaces]]
binding = "BROWSER_BUDGET_KV"
id = "placeholder_browser_budget_kv"

[[env.production.r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "1stcontact-assets"

[[env.production.d1_databases]]
binding = "SITES_DB"
database_name = "1stcontact-sites"
database_id = "placeholder_sites_db"

[env.production.browser]
binding = "BROWSER"
