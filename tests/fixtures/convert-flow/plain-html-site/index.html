<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Plain HTML Site — Reference Fixture</title>
  <style>
    body {
      background: #ffffff;
      color: #222222;
      font-family: "Inter", system-ui, sans-serif;
      font-size: 16px;
      font-weight: 400;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }
    h1, h2 {
      color: #16a34a;
      font-family: "Source Serif Pro", serif;
      font-weight: 700;
    }
    h1 { font-size: 48px; }
    h2 { font-size: 32px; }
    button, .cta {
      background-color: #2563eb;
      color: #ffffff;
    }
    .hero {
      background-image: url(/hero-bg.jpg);
    }
  </style>
</head>
<body>
  <nav>
    <a href="/"><img src="/logo.svg" alt="Acme" width="100" height="100"></a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </nav>
  <main class="container">
    <section class="hero">
      <img src="/hero.jpg" alt="Hero illustration" width="1200" height="600">
      <h1>Build with Acme</h1>
      <p>A static reference page used by REQ-21 tests.</p>
      <button class="cta">Get started</button>
    </section>
    <section class="features">
      <h2>Features</h2>
      <img src="/feature.png" alt="Feature screenshot" width="400" height="400">
      <ul>
        <li>Fast</li>
        <li>Friendly</li>
        <li>Free</li>
      </ul>
    </section>
    <section class="contact" style="background-image: url(/footer-bg.png);">
      <h2>Contact</h2>
      <form action="/contact" method="POST">
        <input name="email" type="email" required>
        <textarea name="message"></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
    <section class="promo">
      <video src="/intro.mp4" controls></video>
      <video controls>
        <source src="/promo.webm" type="video/webm">
      </video>
    </section>
  </main>
</body>
</html>
