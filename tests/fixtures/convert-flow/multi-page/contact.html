<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact — The Daily Loaf</title>
  <style>
    body { background: #fffbeb; color: #1c1917; font-family: "Source Sans Pro", system-ui, sans-serif; }
    h1, h2 { color: #b45309; font-family: "Merriweather", Georgia, serif; }
    button { background-color: #b45309; color: white; padding: 12px 24px; }
    header nav a { margin-right: 16px; color: #1c1917; }
    label { display: block; margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <a href="/" aria-label="Home">
      <img src="https://multi-page.test/logo.png" alt="Logo" width="120" height="40">
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/menu.html">Menu</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h1>Get in touch</h1>
    <p>Pre-orders, catering, or just to say hi.</p>
    <form>
      <label>Name <input name="name" type="text"></label>
      <label>Email <input name="email" type="email"></label>
      <label>Message <textarea name="message"></textarea></label>
      <button type="submit">Send</button>
    </form>
  </main>
</body>
</html>
