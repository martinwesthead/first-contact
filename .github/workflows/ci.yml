name: CI

on:
  pull_request:
    branches: [main, xgd-working, xgd-stable]
  workflow_dispatch:

jobs:
  check:
    name: Build + dry-run deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Run tests
        run: pnpm test

      - name: Dry-run public-site deploy
        run: pnpm dryrun:public

      - name: Dry-run control-app deploy
        run: pnpm dryrun:control
